name: coselig_staff_portal
description: "coselig.com staff portal application"
publish_to: 'none'
version: 0.3.4+18

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  excel: ^4.0.3
  intl: ^0.20.2
  universal_html: ^2.3.0
  flutter_blue_plus: ^2.1.1
  permission_handler: ^12.0.1
  package_info_plus: ^9.0.0
  google_sign_in: ^7.2.0
  web: ^1.0.0
  url_launcher: ^6.3.0
  universal_web: ^1.1.1+1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "ctc_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Iansui
      fonts:
        - asset: assets/fonts/Iansui-Regular.ttf
